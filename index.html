<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记账</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bar-maslow-1 { background-color: #10b981; }
        .bar-maslow-2 { background-color: #3b82f6; }
        .bar-maslow-3 { background-color: #ec4899; }
        .bar-maslow-4 { background-color: #8b5cf6; }
        .bar-maslow-5 { background-color: #f59e0b; }
        
        .border-maslow-1 { border-left-color: #10b981; }
        .border-maslow-2 { border-left-color: #3b82f6; }
        .border-maslow-3 { border-left-color: #ec4899; }
        .border-maslow-4 { border-left-color: #8b5cf6; }
        .border-maslow-5 { border-left-color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans text-gray-900">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-20 flex justify-center items-center">
        <h1 class="text-xl font-bold">记账</h1>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
        
        <section class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h2 class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">新增支出</h2>
            <div class="space-y-4 mb-6">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-[10px] text-gray-400 ml-1">金额</label>
                        <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="w-full text-3xl font-light p-2 border-b border-gray-100 focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div class="w-32">
                        <label class="text-[10px] text-gray-400 ml-1">标准分类</label>
                        <select id="standardCat" class="w-full text-sm p-2 mt-1 border-b border-gray-100 bg-transparent focus:border-blue-500 outline-none">
                            <option value="餐饮美食">餐饮美食</option>
                            <option value="交通出行">交通出行</option>
                            <option value="住家物业">住家物业</option>
                            <option value="生活服务">生活服务</option>
                            <option value="服饰装扮">服饰装扮</option>
                            <option value="日用百货">日用百货</option>
                            <option value="数码电器">数码电器</option>
                            <option value="医疗保健">医疗保健</option>
                            <option value="教育学习">教育学习</option>
                            <option value="休闲娱乐">休闲娱乐</option>
                            <option value="人情往来">人情往来</option>
                            <option value="其他支出">其他支出</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 ml-1">详情备注 (选填)</label>
                    <input type="text" id="note" placeholder="具体用途..." class="w-full text-sm p-2 border-b border-gray-100 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>
            
            <p class="text-[10px] text-gray-400 mb-3 ml-1 text-center font-bold">选择马斯洛分类保存：</p>
            <div class="grid grid-cols-1 gap-2">
                <button type="button" onclick="handleSave('生理需要（吃喝睡）', 1)" class="w-full p-4 text-white rounded-xl bg-emerald-500 text-xs font-bold active:bg-emerald-600 active:scale-95 transition-all shadow-sm">生理需要（吃喝睡）</button>
                <button type="button" onclick="handleSave('安全需要（健康保障、工作保障）', 2)" class="w-full p-4 text-white rounded-xl bg-blue-500 text-xs font-bold active:bg-blue-600 active:scale-95 transition-all shadow-sm">安全需要（健康保障、工作保障）</button>
                <button type="button" onclick="handleSave('情感与归属（友情、爱情、亲情）', 3)" class="w-full p-4 text-white rounded-xl bg-pink-500 text-xs font-bold active:bg-pink-600 active:scale-95 transition-all shadow-sm">情感与归属（友情、爱情、亲情）</button>
                <button type="button" onclick="handleSave('尊重（自我尊重、被他人尊重）', 4)" class="w-full p-4 text-white rounded-xl bg-violet-500 text-xs font-bold active:bg-violet-600 active:scale-95 transition-all shadow-sm">尊重（自我尊重、被他人尊重）</button>
                <button type="button" onclick="handleSave('自我实现（求知、审美、实现自我）', 5)" class="w-full p-4 text-white rounded-xl bg-amber-500 text-xs font-bold active:bg-amber-600 active:scale-95 transition-all shadow-sm">自我实现（求知、审美、实现自我）</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <div class="mb-4 text-center border-b border-gray-50 pb-4">
                <p class="text-gray-400 text-xs mb-1">选定范围总支出</p>
                <p class="text-4xl font-black text-gray-900" id="totalAmount">¥0.00</p>
            </div>

            <div class="space-y-3 mb-6 bg-gray-50 p-3 rounded-xl">
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400 w-12">筛选:</span>
                    <select id="filterType" onchange="renderData()" class="flex-1 bg-white border border-gray-200 text-sm rounded-lg p-1">
                        <option value="all">所有时间</option>
                        <option value="month" selected>按月查看</option>
                        <option value="range">自定义区间</option>
                    </select>
                </div>
                <div id="monthFilterContainer" class="flex items-center gap-2">
                    <span class="text-xs text-gray-400 w-12">月份:</span>
                    <select id="filterMonth" onchange="renderData()" class="flex-1 bg-white border border-gray-200 text-sm rounded-lg p-1"></select>
                </div>
                <div id="rangeFilterContainer" class="hidden space-y-2">
                    <div class="flex items-center gap-2"><span class="text-xs text-gray-400 w-12">从:</span><input type="date" id="startDate" onchange="renderData()" class="flex-1 text-sm p-1 rounded border border-gray-200 bg-white"></div>
                    <div class="flex items-center gap-2"><span class="text-xs text-gray-400 w-12">至:</span><input type="date" id="endDate" onchange="renderData()" class="flex-1 text-sm p-1 rounded border border-gray-200 bg-white"></div>
                </div>
            </div>

            <div class="flex mb-4 p-1 bg-gray-100 rounded-lg">
                <button onclick="switchView('maslow')" id="btnMaslow" class="flex-1 py-2 text-xs font-bold rounded-md bg-white shadow-sm transition-all">马斯洛视角</button>
                <button onclick="switchView('standard')" id="btnStandard" class="flex-1 py-2 text-xs font-bold rounded-md text-gray-500 transition-all">标准场景视角</button>
            </div>

            <div id="breakdownContainer" class="space-y-4"></div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4 px-1">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">历史记录</h2>
                <button onclick="exportCSV()" class="text-[10px] text-blue-500 bg-blue-50 px-2 py-1 rounded">导出 CSV</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </main>

    <script>
        // --- 初始化与核心数据 ---
        let records = [];
        try {
            records = JSON.parse(localStorage.getItem('my_expenses_v6')) || [];
        } catch(e) {
            records = [];
        }

        let currentView = 'maslow';
        const maslowCategories = ['生理需要（吃喝睡）','安全需要（健康保障、工作保障）','情感与归属（友情、爱情、亲情）','尊重（自我尊重、被他人尊重）','自我实现（求知、审美、实现自我）'];
        const standardCategories = ['餐饮美食', '交通出行', '住家物业', '生活服务', '服饰装扮', '日用百货', '数码电器', '医疗保健', '教育学习', '休闲娱乐', '人情往来', '其他支出'];

        // --- 保存逻辑 (修复重点) ---
        function handleSave(maslowCat, maslowId) {
            const amtDom = document.getElementById('amount');
            const noteDom = document.getElementById('note');
            const stdCatDom = document.getElementById('standardCat');
            
            const amount = parseFloat(amtDom.value);
            
            if (isNaN(amount) || amount <= 0) {
                alert("请先输入正确的金额");
                amtDom.focus();
                return;
            }

            const newRecord = {
                id: Date.now(),
                amount: amount,
                maslowCategory: maslowCat,
                maslowId: maslowId,
                standardCategory: stdCatDom.value,
                note: noteDom.value.trim(),
                time: new Date().toISOString()
            };

            // 保存数据
            records.unshift(newRecord);
            localStorage.setItem('my_expenses_v6', JSON.stringify(records));

            // 清空输入框
            amtDom.value = '';
            noteDom.value = '';
            
            // 立即刷新所有 UI
            initFilters();
            renderData();
        }

        // --- UI 控制逻辑 ---
        function switchView(view) {
            currentView = view;
            document.getElementById('btnMaslow').className = `flex-1 py-2 text-xs font-bold rounded-md ${view==='maslow'?'bg-white shadow-sm text-gray-900':'text-gray-400'}`;
            document.getElementById('btnStandard').className = `flex-1 py-2 text-xs font-bold rounded-md ${view==='standard'?'bg-white shadow-sm text-gray-900':'text-gray-400'}`;
            renderData();
        }

        function initFilters() {
            const mSelect = document.getElementById('filterMonth');
            const months = [...new Set(records.map(r => r.time.substring(0, 7)))].sort().reverse();
            
            const currentMonth = new Date().toISOString().substring(0, 7);
            const savedSelectedMonth = mSelect.value;

            if (months.length === 0) {
                mSelect.innerHTML = `<option value="${currentMonth}">${currentMonth}</option>`;
            } else {
                mSelect.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
                if (savedSelectedMonth && months.includes(savedSelectedMonth)) {
                    mSelect.value = savedSelectedMonth;
                }
            }
        }

        function renderData() {
            const type = document.getElementById('filterType').value;
            const historyList = document.getElementById('historyList');
            const totalEl = document.getElementById('totalAmount');
            const breakdownEl = document.getElementById('breakdownContainer');
            
            // 处理显示切换
            document.getElementById('monthFilterContainer').classList.toggle('hidden', type !== 'month');
            document.getElementById('rangeFilterContainer').classList.toggle('hidden', type !== 'range');

            // 执行过滤
            let filtered = records;
            if (type === 'month') {
                const target = document.getElementById('filterMonth').value;
                filtered = records.filter(r => r.time.startsWith(target));
            } else if (type === 'range') {
                const start = document.getElementById('startDate').value;
                const end = document.getElementById('endDate').value;
                filtered = records.filter(r => {
                    const rd = r.time.split('T')[0];
                    return (!start || rd >= start) && (!end || rd <= end);
                });
            }

            // 计算统计
            let total = 0;
            let mStats = {}; maslowCategories.forEach((c, i) => mStats[c] = {sum: 0, id: i + 1});
            let sStats = {}; standardCategories.forEach(c => sStats[c] = 0);

            historyList.innerHTML = '';
            filtered.forEach(r => {
                total += r.amount;
                if (mStats[r.maslowCategory]) mStats[r.maslowCategory].sum += r.amount;
                if (sStats.hasOwnProperty(r.standardCategory)) sStats[r.standardCategory] += r.amount;

                const d = new Date(r.time);
                const noteHtml = r.note ? `<div class="mt-2 text-sm text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100">${r.note}</div>` : '';
                
                historyList.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-maslow-${r.maslowId}">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-2xl font-black">¥${r.amount.toFixed(2)}</span>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[10px] px-2 py-0.5 bg-gray-100 rounded-full text-gray-500 font-bold">${r.standardCategory}</span>
                                    <span class="text-[10px] text-gray-400 font-medium">${r.maslowCategory.split('（')[0]}</span>
                                </div>
                            </div>
                            <button onclick="deleteRecord(${r.id})" class="text-gray-300 p-1">
                                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                        ${noteHtml}
                        <div class="text-[10px] text-gray-300 mt-2 text-right italic">${d.toLocaleDateString()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}</div>
                    </div>
                `;
            });

            totalEl.innerText = `¥${total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // 绘制图表
            breakdownEl.innerHTML = '';
            if (currentView === 'maslow') {
                maslowCategories.forEach(cat => {
                    const sum = mStats[cat].sum;
                    if (sum > 0 || type === 'all') {
                        const percent = total > 0 ? (sum / total * 100).toFixed(1) : 0;
                        breakdownEl.innerHTML += `
                            <div class="space-y-1">
                                <div class="flex justify-between text-[11px] font-medium"><span class="text-gray-500">${cat}</span><span>¥${sum.toFixed(2)} (${percent}%)</span></div>
                                <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bar-maslow-${mStats[cat].id}" style="width:${percent}%"></div></div>
                            </div>
                        `;
                    }
                });
            } else {
                standardCategories.forEach(cat => {
                    const sum = sStats[cat];
                    if (sum > 0 || type === 'all') {
                        const percent = total > 0 ? (sum / total * 100).toFixed(1) : 0;
                        breakdownEl.innerHTML += `
                            <div class="space-y-1">
                                <div class="flex justify-between text-[11px] font-medium"><span class="text-gray-500">${cat}</span><span>¥${sum.toFixed(2)} (${percent}%)</span></div>
                                <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-gray-400" style="width:${percent}%"></div></div>
                            </div>
                        `;
                    }
                });
            }
        }

        function deleteRecord(id) {
            if(confirm('确认删除这笔账单吗？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('my_expenses_v6', JSON.stringify(records));
                initFilters();
                renderData();
            }
        }

        function exportCSV() {
            let csv = '\uFEFF时间,金额,标准分类,马斯洛分类,备注\n';
            records.forEach(r => {
                csv += `${r.time.replace('T',' ').substring(0,19)},${r.amount},"${r.standardCategory}","${r.maslowCategory}","${r.note || ''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `账本_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // --- 启动引导 ---
        window.onload = () => {
            // 默认日期选择
            const d = new Date();
            const today = d.toISOString().split('T')[0];
            const firstDay = today.substring(0, 8) + '01';
            document.getElementById('startDate').value = firstDay;
            document.getElementById('endDate').value = today;

            initFilters();
            renderData();
        };
    </script>
</body>
</html>
